# set -g default-terminal "screen-255color"

set -g mode-keys vi

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

set -g prefix C-a
bind C-a send-prefix
unbind C-b

bind a last-window
bind r source-file ~/.tmux.conf
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

bind space choose-tree -Z -s
bind w choose-tree -Z -w

setw -g aggressive-resize on

set -g allow-rename off
set -g mouse on
set -g focus-events on

set -g history-limit 999999
set -g base-index 1
setw -g pane-base-index 1

setw -g clock-mode-style 24

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage"
run '~/.tmux/plugins/tpm/tpm'

setw -g pane-border-status top
setw -g pane-active-border-style 'fg=red'
setw -g pane-border-lines double
set -g pane-border-format " #{?pane_active,#[fg=yellow],#[fg=gray]}[#{pane_index}] #{b:pane_current_path} @ #{pane_current_command} "
